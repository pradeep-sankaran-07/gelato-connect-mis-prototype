// ─── Utility functions ───
function daysUntil(dateStr) {
  const now = new Date("2026-04-10");
  const target = new Date(dateStr);
  return Math.ceil((target - now) / (1000 * 60 * 60 * 24));
}

function formatDate(dateStr) {
  if (!dateStr) return "—";
  const d = new Date(dateStr);
  return d.toLocaleDateString("en-US", { month: "short", day: "numeric" });
}

function isPastDue(dateStr) {
  if (!dateStr) return false;
  return new Date(dateStr) < new Date("2026-04-10");
}

// ─── Components ───

function StatusBadge({ status }) {
  const s = STATUS_MAP[status];
  return (
    <span
      style={{
        display: "inline-flex",
        alignItems: "center",
        gap: 6,
        padding: "4px 12px",
        borderRadius: T.radius.badge,
        background: s.bg,
        color: s.text,
        fontSize: 12,
        fontWeight: 600,
        border: `1px solid ${s.border}`,
      }}
    >
      <span
        style={{
          width: 8,
          height: 8,
          borderRadius: "50%",
          background: s.dot,
          flexShrink: 0,
        }}
      />
      {s.label}
    </span>
  );
}

function JiraStatusBadge({ status }) {
  const c = JIRA_STATUS_COLORS[status] || { bg: T.neutral10, text: T.neutral80 };
  return (
    <span
      style={{
        display: "inline-block",
        padding: "2px 8px",
        borderRadius: 4,
        background: c.bg,
        color: c.text,
        fontSize: 11,
        fontWeight: 500,
        whiteSpace: "nowrap",
      }}
    >
      {status}
    </span>
  );
}

function ProgressBar({ value, color }) {
  const fill = value <= 10 ? T.critical60 : value <= 40 ? T.warning50 : T.success50;
  return (
    <div
      style={{
        display: "flex",
        alignItems: "center",
        gap: 10,
        width: "100%",
      }}
    >
      <div
        style={{
          flex: 1,
          height: 8,
          borderRadius: 8,
          background: T.neutral20,
          overflow: "hidden",
        }}
      >
        <div
          style={{
            width: `${Math.max(value, 2)}%`,
            height: "100%",
            borderRadius: 8,
            background: color || fill,
            transition: "width 0.4s ease",
          }}
        />
      </div>
      <span style={{ fontSize: 13, fontWeight: 600, color: T.neutral90, minWidth: 36, textAlign: "right" }}>
        {value}%
      </span>
    </div>
  );
}

  const pastDue = isPastDue(story.dueDate);
  return (
    <tr

        borderBottom: `1px solid ${T.neutral20}`,
        transition: "background 0.15s ease",
      }}
      onMouseEnter={(e) => (e.currentTarget.style.background = T.alphaP5)}
      onMouseLeave={(e) => (e.currentTarget.style.background = "transparent")}

      <td style={{ padding: "8px 12px", fontSize: 13 }}>
        <a
          href={`${JIRA_BASE}/${story.key}`}

          rel="noopener noreferrer"
          style={{

            textDecoration: "none",

      <td style={{ padding: "8px 12px" }}>

        {formatDate(story.dueDate)}

      </td>
    </tr>
  );
}

                    fontWeight: 600,

                    textAlign: "left",
                    textTransform: "uppercase",
                    letterSpacing: "0.5px",
                  }}
                >
                  Summary
                </th>
                <th
                  style={{
                    padding: "8px 12px",
                    fontSize: 11,
                    fontWeight: 600,
                    color: T.neutral70,
                    textAlign: "left",
                    textTransform: "uppercase",
                    letterSpacing: "0.5px",
                  }}
                >
                  Status
                </th>
                <th
                  style={{
                    padding: "8px 12px",
                    fontSize: 11,
                    fontWeight: 600,
                    color: T.neutral70,
                    textAlign: "left",
                    textTransform: "uppercase",
                    letterSpacing: "0.5px",
                  }}
                >
                  Due
                </th>
              </tr>
            </thead>
            <tbody>
              {epic.stories.map((story) => (
                <StoryRow key={story.key} story={story} />
              ))}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

function WorkstreamCard({ ws }) {
  const [expanded, setExpanded] = React.useState(false);
  const s = STATUS_MAP[ws.status];
  const deadlineDays = daysUntil(ws.deadline);
  const deadlinePast = deadlineDays < 0;

  const totalStories = ws.epics.reduce((acc, e) => acc + e.stories.length, 0);
  const doneStories = ws.epics.reduce((acc, e) => acc + e.stories.filter((s) => s.status === "Done").length, 0);
  const activeStories = ws.epics.reduce(
    (acc, e) => acc + e.stories.filter((s) => ["In Progress", "In Review", "On Staging", "Selected"].includes(s.status)).length,
    0
  );

  return (
    <div
      style={{
        borderRadius: 12,
        border: `1px solid ${T.neutral20}`,
        background: T.white,
        overflow: "hidden",
        transition: "box-shadow 0.15s ease",
        boxShadow: expanded ? "0 4px 12px rgba(0,0,0,0.08)" : "0 1px 3px rgba(0,0,0,0.04)",
      }}
    >
      {/* Card Header */}
      <div
        onClick={() => setExpanded(!expanded)}
        style={{
          padding: "16px 20px",
          cursor: "pointer",
          display: "flex",
          flexDirection: "column",
          gap: 12,
        }}
      >
        <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between" }}>
          <div style={{ flex: 1 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 4 }}>
              <span
                style={{
                  transform: expanded ? "rotate(90deg)" : "rotate(0deg)",
                  transition: "transform 0.15s ease",
                  fontSize: 12,
                  color: T.neutral50,
                }}
              >
                ▶
              </span>
              <h3 style={{ margin: 0, fontSize: 16, fontWeight: 600, color: T.neutral100 }}>{ws.name}</h3>
            </div>
            <div style={{ marginLeft: 22, display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
              <span style={{ fontSize: 13, color: T.neutral60 }}>
                Owner: <strong style={{ color: T.neutral90 }}>{ws.ownerFull}</strong>
              </span>
              <span style={{ color: T.neutral30 }}>|</span>
              <span style={{ fontSize: 13, color: T.neutral60 }}>
                Team: <strong style={{ color: T.neutral90 }}>{ws.team}</strong>
              </span>
            </div>
          </div>
          <StatusBadge status={ws.status} />
        </div>

        {/* Stats row */}
        <div style={{ marginLeft: 22, display: "flex", alignItems: "center", gap: 20 }}>
          <div style={{ flex: 1, maxWidth: 260 }}>
            <ProgressBar value={ws.progress} />
          </div>
          <div style={{ display: "flex", gap: 16, fontSize: 12, color: T.neutral60 }}>
            <span>
              <strong style={{ color: T.neutral90 }}>{doneStories}</strong>/{totalStories} done
            </span>
            <span>
              <strong style={{ color: T.neutral90 }}>{activeStories}</strong> active
            </span>
            <span
              style={{
                color: deadlinePast ? T.critical70 : deadlineDays <= 7 ? T.warning70 : T.neutral60,
                fontWeight: deadlinePast ? 600 : 400,
              }}
            >
              {deadlinePast
                ? `${Math.abs(deadlineDays)}d overdue`
                : `${deadlineDays}d left`}{" "}
              ({formatDate(ws.deadline)})
            </span>
          </div>
        </div>

        {/* Reason */}
        <p
          style={{
            margin: "0 0 0 22px",
            fontSize: 13,
            color: T.neutral70,
            lineHeight: 1.4,
            fontStyle: "italic",
          }}
        >
          {ws.reason}
        </p>
      </div>

      {/* Expanded: Epics + Stories */}
      {expanded && (
        <div
          style={{
            padding: "0 20px 16px",
            borderTop: `1px solid ${T.neutral20}`,
          }}
        >
          <div style={{ paddingTop: 12 }}>
            {ws.epics.map((epic) => (
              <EpicSection key={epic.key} epic={epic} />
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

function MilestoneTimeline() {
  return (
    <div
      style={{
        display: "flex",
        alignItems: "center",
        gap: 0,
        padding: "16px 20px",
        borderRadius: 12,
        border: `1px solid ${T.neutral20}`,
        background: T.white,
        overflow: "hidden",
      }}
    >
      {MILESTONES.map((m, i) => {
        const isToday = m.status === "today";
        const isDone = m.status === "done";
        const dotColor = isDone ? T.success50 : isToday ? T.neutral100 : T.neutral30;
        const textColor = isDone ? T.neutral60 : isToday ? T.neutral100 : T.neutral50;
        const dateColor = isDone ? T.neutral50 : isToday ? T.neutral90 : T.neutral40;

        return (
          <div
            key={m.name}
            style={{
              flex: 1,
              display: "flex",
              flexDirection: "column",
              alignItems: "center",
              position: "relative",
            }}
          >
            {/* Connector line */}
            {i > 0 && (
              <div
                style={{
                  position: "absolute",
                  top: 10,
                  right: "50%",
                  width: "100%",
                  height: 2,
                  background: isDone ? T.success50 : T.neutral20,
                  zIndex: 0,
                }}
              />
            )}
            <div
              style={{
                width: isToday ? 20 : 12,
                height: isToday ? 20 : 12,
                borderRadius: "50%",
                background: dotColor,
                border: isToday ? `3px solid ${T.neutral100}` : "none",
                zIndex: 1,
                boxShadow: isToday ? "0 0 0 4px rgba(33,33,33,0.12)" : "none",
              }}
            />
            <span
              style={{
                marginTop: 8,
                fontSize: 12,
                fontWeight: isToday ? 600 : 400,
                color: textColor,
                textAlign: "center",
              }}
            >
              {m.name}
            </span>
            <span style={{ fontSize: 11, color: dateColor }}>{formatDate(m.date)}</span>
          </div>
        );
      })}
    </div>
  );
}

function OverallStatusCard() {
  const daysLeft = daysUntil(PHASE1_DEADLINE);
  const totalStories = WORKSTREAMS.reduce(
    (acc, ws) => acc + ws.epics.reduce((a, e) => a + e.stories.length, 0),
    0
  );
  const doneStories = WORKSTREAMS.reduce(
    (acc, ws) => acc + ws.epics.reduce((a, e) => a + e.stories.filter((s) => s.status === "Done").length, 0),
    0
  );
  const activeStories = WORKSTREAMS.reduce(
    (acc, ws) =>
      acc +
      ws.epics.reduce(
        (a, e) =>
          a + e.stories.filter((s) => ["In Progress", "In Review", "On Staging"].includes(s.status)).length,
        0
      ),
    0
  );
  const backlogStories = totalStories - doneStories - activeStories;
  const overallProgress = Math.round((doneStories / totalStories) * 100);

  return (
    <div
      style={{
        borderRadius: 12,
        border: `1px solid ${T.critical80}`,
        background: `linear-gradient(135deg, ${T.critical5} 0%, ${T.white} 100%)`,
        padding: 24,
      }}
    >
      <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", marginBottom: 20 }}>
        <div>
          <h2 style={{ margin: 0, fontSize: 22, fontWeight: 600, color: T.neutral100 }}>
            GelatoConnect MIS — Phase 1
          </h2>
          <p style={{ margin: "4px 0 0", fontSize: 14, color: T.neutral60 }}>
            Go-live target: May 1, 2026 · <strong style={{ color: T.critical70 }}>{daysLeft} days remaining</strong>
          </p>
        </div>
        <StatusBadge status="OFF_TRACK" />
      </div>

      <div
        style={{
          display: "grid",
          gridTemplateColumns: "repeat(4, 1fr)",
          gap: 16,
          marginBottom: 20,
        }}
      >
        {[
          { label: "Total Stories", value: totalStories, color: T.neutral100 },
          { label: "Done", value: doneStories, color: T.success70 },
          { label: "Active", value: activeStories, color: T.warning70 },
          { label: "Backlog", value: backlogStories, color: T.critical60 },
        ].map((stat) => (
          <div
            key={stat.label}
            style={{
              padding: "12px 16px",
              borderRadius: 8,
              background: T.white,
              border: `1px solid ${T.neutral20}`,
              textAlign: "center",
            }}
          >
            <div style={{ fontSize: 28, fontWeight: 700, color: stat.color }}>{stat.value}</div>
            <div style={{ fontSize: 12, color: T.neutral60, marginTop: 2 }}>{stat.label}</div>
          </div>
        ))}
      </div>

      <div style={{ marginBottom: 12 }}>
        <div style={{ fontSize: 12, color: T.neutral60, marginBottom: 6, fontWeight: 500 }}>Overall Delivery Progress</div>
        <ProgressBar value={overallProgress} color={T.critical60} />
      </div>

      <div
        style={{
          padding: "12px 16px",
          borderRadius: 8,
          background: T.critical10,
          border: `1px solid ${T.critical80}`,
          fontSize: 13,
          color: T.critical90,
          lineHeight: 1.5,
        }}
      >
        <strong>Assessment:</strong> Project is off track for May 1 delivery. ~1 week was lost on architectural
        discussions. Most work streams have the majority of stories still in Backlog. WS3b (Production Planning) and WS4
        (Invoicing) have zero progress. The cross-cutting Week 1 epic is past due. Immediate escalation and re-scoping
        recommended.
      </div>
    </div>
  );
}

        style={{
          background: T.neutral100,

              borderRadius: 8,

            ].map((f) => (
              <button

                style={{

                  background: filter === f.key ? T.neutral100 : T.white,
                  color: filter === f.key ? T.white : T.neutral90,
